apply plugin: "com.android.application"

android {
    namespace "com.superseatmap.app"
    compileSdk 34

    defaultConfig {
        applicationId "com.superseatmap.app"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            storeFile file("super-seat-map.keystore")
            storePassword "superseatmap"
            keyAlias "superseatmap"
            keyPassword "superseatmap"
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
        }
        debug {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation "androidx.appcompat:appcompat:1.6.1"
}
